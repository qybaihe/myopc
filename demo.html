<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOPC Layout Demo</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-surface: #161922;
    --bg-elevated: #1c1f2e;
    --bg-hover: #252838;
    --border: #2a2d3e;
    --text: #e2e4eb;
    --text-secondary: #8b8fa3;
    --text-muted: #5c6078;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --green: #00cec9;
    --green-bg: rgba(0,206,201,0.12);
    --yellow: #fdcb6e;
    --yellow-bg: rgba(253,203,110,0.12);
    --red: #ff6b6b;
    --red-bg: rgba(255,107,107,0.12);
    --blue: #74b9ff;
    --blue-bg: rgba(116,185,255,0.12);
    --sidebar-w: 240px;
    --topbar-h: 56px;
    --bottombar-h: 32px;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

  /* === Topbar === */
  .topbar {
    height: var(--topbar-h); background: var(--bg-surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 32px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  .logo { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; color: var(--accent-light); }
  .logo span { color: var(--text); font-weight: 400; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-secondary);
    transition: all .15s; border: none; background: none; font-family: inherit;
  }
  .nav-tab:hover { background: var(--bg-hover); color: var(--text); }
  .nav-tab.active { background: var(--accent); color: #fff; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-secondary);
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; }

  /* === Layout Shell === */
  .shell { display: flex; margin-top: var(--topbar-h); height: calc(100vh - var(--topbar-h) - var(--bottombar-h)); }

  /* === Sidebar === */
  .sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--bg-surface);
    border-right: 1px solid var(--border); padding: 16px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar-search {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px;
    background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; margin-bottom: 8px;
  }
  .sidebar-item {
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 10px; transition: all .15s;
  }
  .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
  .sidebar-item.active { background: var(--accent); color: #fff; }
  .sidebar-item .icon { width: 18px; text-align: center; }
  .sidebar-section { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); padding: 16px 12px 4px; }
  .sidebar-btn {
    margin-top: auto; padding: 10px; border-radius: 6px; background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; text-align: center;
  }
  .sidebar-btn:hover { opacity: .9; }
  .sidebar-nested { padding-left: 28px; }

  /* === Main Content === */
  .main { flex: 1; overflow-y: auto; padding: 24px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-actions { display: flex; gap: 8px; }
  .btn {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg-elevated); color: var(--text); font-family: inherit; transition: all .15s;
  }
  .btn:hover { background: var(--bg-hover); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .9; }

  /* === Metric Cards === */
  .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .metric-card {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
  }
  .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .metric-value { font-size: 28px; font-weight: 700; }
  .metric-change { font-size: 12px; margin-top: 6px; }
  .metric-change.up { color: var(--green); }
  .metric-change.down { color: var(--red); }

  /* === Content Panels === */
  .panel { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .panel-title .badge { font-size: 11px; background: var(--bg-elevated); padding: 2px 8px; border-radius: 10px; color: var(--text-secondary); font-weight: 400; }
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
  .half-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  /* === Task List === */
  .task-item {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-info { display: flex; flex-direction: column; gap: 4px; }
  .task-name { font-size: 13px; }
  .task-meta { font-size: 11px; color: var(--text-muted); }
  .progress-bar { width: 120px; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .progress-fill.green { background: var(--green); }
  .progress-fill.yellow { background: var(--yellow); }
  .progress-fill.blue { background: var(--blue); }
  .task-percent { font-size: 12px; color: var(--text-secondary); min-width: 36px; text-align: right; }

  /* === Approval Cards === */
  .approval-card { padding: 12px; background: var(--bg-elevated); border-radius: 6px; margin-bottom: 8px; }
  .approval-card:last-child { margin-bottom: 0; }
  .approval-header { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .approval-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
  .approval-actions { display: flex; gap: 6px; }
  .approval-actions .btn { padding: 4px 12px; font-size: 12px; }

  /* === Server Card === */
  .server-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .server-card {
    padding: 16px; background: var(--bg-elevated); border-radius: 6px; border: 1px solid var(--border);
  }
  .server-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .server-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.online { background: var(--green); }
  .status-dot.offline { background: var(--red); }
  .status-dot.warning { background: var(--yellow); }

  /* === Project Cards === */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .project-card {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
    cursor: pointer; transition: all .15s;
  }
  .project-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .project-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .project-domain { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
  .project-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); }
  .project-agents { margin-top: 12px; display: flex; gap: 6px; }

  /* === Employee Cards === */
  .employee-item {
    display: flex; align-items: center; padding: 16px 20px; background: var(--bg-surface);
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px;
    gap: 16px;
  }
  .employee-avatar {
    width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; flex-shrink: 0;
  }
  .employee-info { flex: 1; }
  .employee-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .employee-model { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .employee-task { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .employee-budget { font-size: 12px; color: var(--text-muted); }
  .employee-actions { display: flex; gap: 6px; }

  /* === Skill Cards === */
  .skill-card {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px;
  }
  .skill-icon { font-size: 28px; margin-bottom: 10px; }
  .skill-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .skill-level { font-size: 11px; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
  .skill-level.l1 { background: var(--blue-bg); color: var(--blue); }
  .skill-level.l2 { background: var(--green-bg); color: var(--green); }
  .skill-level.l3 { background: rgba(108,92,231,0.12); color: var(--accent-light); }
  .skill-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; line-height: 1.5; }
  .skill-reqs { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
  .skill-footer { display: flex; justify-content: space-between; align-items: center; }

  /* === Knowledge Layout === */
  .knowledge-layout { display: flex; gap: 0; height: calc(100vh - var(--topbar-h) - var(--bottombar-h) - 48px); }
  .doc-tree {
    width: 200px; min-width: 200px; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px; overflow-y: auto; margin-right: 16px;
  }
  .tree-item { padding: 6px 8px; font-size: 12px; color: var(--text-secondary); cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
  .tree-item:hover { background: var(--bg-hover); color: var(--text); }
  .tree-item.active { background: var(--accent); color: #fff; }
  .tree-folder { color: var(--text-muted); font-size: 11px; }
  .doc-editor {
    flex: 1; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; overflow-y: auto;
  }
  .doc-editor h1 { font-size: 24px; font-weight: 600; margin-bottom: 16px; }
  .doc-editor p { font-size: 14px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 12px; }
  .doc-editor blockquote {
    border-left: 3px solid var(--accent); padding: 12px 16px; margin: 16px 0;
    background: var(--bg-elevated); border-radius: 0 6px 6px 0; font-size: 13px; color: var(--text-secondary);
  }
  .ai-reply {
    background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin: 16px 0;
  }
  .ai-reply-label { font-size: 11px; color: var(--accent-light); margin-bottom: 6px; font-weight: 500; }
  .ai-reply-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .ai-reply-actions { margin-top: 10px; display: flex; gap: 6px; }

  /* === Analytics Chart Placeholder === */
  .chart-placeholder {
    height: 240px; background: var(--bg-elevated); border-radius: 6px; display: flex;
    align-items: flex-end; padding: 20px; gap: 6px;
  }
  .chart-bar {
    flex: 1; border-radius: 4px 4px 0 0; transition: height .3s;
  }
  .page-rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .page-rank-item:last-child { border-bottom: none; }
  .page-rank-path { color: var(--text); }
  .page-rank-val { color: var(--text-secondary); }

  /* === Settings === */
  .settings-group { margin-bottom: 24px; }
  .settings-group-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .settings-row {
    display: flex; justify-content: space-between; align-items: center; padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; }
  .settings-label small { display: block; color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  .settings-value { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
  .toggle {
    width: 40px; height: 22px; background: var(--bg-elevated); border-radius: 11px; cursor: pointer;
    position: relative; border: 1px solid var(--border);
  }
  .toggle::after {
    content: ''; width: 16px; height: 16px; background: var(--text-muted); border-radius: 50%;
    position: absolute; top: 2px; left: 2px; transition: all .15s;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: 20px; background: #fff; }

  /* === Detail Tabs === */
  .detail-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .detail-back { cursor: pointer; color: var(--text-muted); font-size: 14px; }
  .detail-back:hover { color: var(--text); }
  .detail-title { font-size: 18px; font-weight: 600; flex: 1; }
  .detail-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .detail-tab {
    padding: 10px 20px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .15s;
  }
  .detail-tab:hover { color: var(--text); }
  .detail-tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }
  .detail-content { min-height: 200px; }

  /* === Bottom Bar === */
  .bottombar {
    height: var(--bottombar-h); background: var(--bg-surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 24px; font-size: 11px; color: var(--text-muted);
    position: fixed; bottom: 0; left: 0; right: 0;
  }
  .bottombar .status-item { display: flex; align-items: center; gap: 6px; }

  /* === Tag / Badge === */
  .tag {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px;
  }
  .tag.green { background: var(--green-bg); color: var(--green); }
  .tag.yellow { background: var(--yellow-bg); color: var(--yellow); }
  .tag.red { background: var(--red-bg); color: var(--red); }
  .tag.blue { background: var(--blue-bg); color: var(--blue); }

  /* View toggle */
  .view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-toggle button {
    padding: 6px 12px; font-size: 12px; background: var(--bg-elevated); border: none; color: var(--text-secondary);
    cursor: pointer; font-family: inherit;
  }
  .view-toggle button.active { background: var(--accent); color: #fff; }

  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

let currentPage = 'dashboard';

function showPage(page) {
  currentPage = page;
  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  // Update sidebar
  document.getElementById('sidebar').innerHTML = sidebars[page] || '';
  // Update main content
  document.getElementById('mainContent').innerHTML = pages[page] || '';
  // Re-render chart if analytics
  if (page === 'analytics') renderChart();
}

function showProjectDetail() {
  showPage('projectDetail');
  // Use projects sidebar for detail
  document.getElementById('sidebar').innerHTML = sidebars.projects;
}

function renderChart() {
  const chart = document.getElementById('trendChart');
  if (!chart) return;
  const values = [65, 40, 55, 70, 85, 45, 90, 60, 75, 50, 80, 95, 55, 70];
  const max = Math.max(...values);
  chart.innerHTML = values.map(v => {
    const h = (v / max * 90);
    const hue = 250 + (v / max * 30);
    return `<div class="chart-bar" style="height:${h}%;background:hsl(${hue},60%,55%)"></div>`;
  }).join('');
}

// Nav tab clicks
document.getElementById('navTabs').addEventListener('click', e => {
  if (e.target.classList.contains('nav-tab')) {
    showPage(e.target.dataset.page);
  }
});

// Sidebar item clicks
document.getElementById('sidebar').addEventListener('click', e => {
  const item = e.target.closest('.sidebar-item');
  if (item) {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  }
  const btn = e.target.closest('.sidebar-btn');
  if (btn) {
    alert('此功能尚未实现');
  }
});

// Toggle clicks
document.addEventListener('click', e => {
  if (e.target.classList.contains('toggle')) {
    e.target.classList.toggle('on');
  }
});

// Detail tab clicks
document.addEventListener('click', e => {
  if (e.target.classList.contains('detail-tab')) {
    const tabs = e.target.parentElement;
    tabs.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
  }
});

// View toggle clicks
document.addEventListener('click', e => {
  const toggle = e.target.closest('.view-toggle');
  if (toggle && e.target.tagName === 'BUTTON') {
    toggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
  }
});

// Approval buttons
document.addEventListener('click', e => {
  if (e.target.textContent === '批准') {
    const card = e.target.closest('.approval-card');
    card.style.opacity = '0.5';
    card.innerHTML = '<div style="color:var(--green);font-size:13px;text-align:center;padding:8px">✓ 已批准</div>';
  }
  if (e.target.textContent === '拒绝') {
    const card = e.target.closest('.approval-card');
    card.style.opacity = '0.5';
    card.innerHTML = '<div style="color:var(--red);font-size:13px;text-align:center;padding:8px">✗ 已拒绝</div>';
  }
});

// Init
showPage('dashboard');
</script>
