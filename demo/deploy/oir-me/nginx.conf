map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

map $host $oir_upstream {
  default http://127.0.0.1:3100;
  oir.me http://127.0.0.1:3100;
  www.oir.me http://127.0.0.1:3100;
  app.oir.me http://127.0.0.1:3100;
  board.oir.me http://127.0.0.1:3100;
  code.oir.me http://127.0.0.1:4096;
  status.oir.me http://127.0.0.1:3001;
  analytics.oir.me http://127.0.0.1:3000;
}

server {
  listen 80;
  server_name oir.me *.oir.me;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass $oir_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600;
  }
}
